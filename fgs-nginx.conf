# nginx.conf
# env FRONTEND_DOMAIN;
# env ENABLE_LOCALHOST_CORS;
# Environment variables will be substituted at container startup

events {}

http {

    # Build a regex for the frontend domain: ^https?://[^/]+\.frontend.com(:port)?$
    map $http_origin $cors_origin {
        default "";

        # Match any subdomain of FRONTEND_DOMAIN
        ~^https?://[^/]+\.${FRONTEND_DOMAIN}(:[0-9]+)?$   $http_origin;
    }

    # Optionally also allow localhost based on ENABLE_LOCALHOST_CORS
    map $http_origin $cors_localhost {
        default "";
        ~^https?://localhost(:[0-9]+)?$   $http_origin;
    }

    # Merge both into one effective CORS origin
    map "$http_origin|$cors_localhost|${ENABLE_LOCALHOST_CORS}" $effective_cors_origin {
        # If frontend matched, always allow it
        ~^([^|]+)\|\|.*$           $1;
        # If no frontend match, but localhost matched and ENABLE_LOCALHOST_CORS=1
        ~^\|([^|]+)\|1$            $1;
        default "";
    }


    map $http_upgrade $connection_upgrade {
        default upgrade;
        ''      close;
    }

    server {
        listen 8080;

        # listen 8080 ssl;
        # ssl_certificate     /etc/nginx/certs/server.crt;
        # ssl_certificate_key /etc/nginx/certs/server.key;

        server_name _;

        # Apply CORS headers at server level
        add_header Access-Control-Allow-Origin  $effective_cors_origin always;
        add_header Access-Control-Allow-Credentials true always;
        add_header Access-Control-Allow-Methods "GET, POST, PUT, PATCH, DELETE, OPTIONS" always;
        add_header Access-Control-Allow-Headers "Authorization, Content-Type, apikey, x-client-info" always;
        add_header Access-Control-Max-Age 86400 always;

        # CORS preflight
        if ($request_method = OPTIONS) {
            return 204;
        }

        # /supabase/<project>/... -> https://<project>.supabase.co/...
        location ~ ^/supabase/([^/]+)/(.*)$ {
            set $project $1;
            set $rest    /$2;

            resolver 1.1.1.1 valid=60s;
            proxy_ssl_server_name on;

            proxy_set_header Host              $project.supabase.co;
            proxy_set_header X-Real-IP         $remote_addr;
            proxy_set_header X-Forwarded-For   $proxy_add_x_forwarded_for;
            proxy_set_header X-Forwarded-Proto $scheme;
            proxy_set_header Upgrade           $http_upgrade;
            proxy_set_header Connection        $connection_upgrade;

            proxy_pass https://$project.supabase.co$rest$is_args$args;
        }
    }
}
