version: '3.8'

services:
  fgs-nginx-proxy:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: fgs-supabase-proxy
    ports:
      - "8080:8080"
    env_file:
      - .env.example
    restart: unless-stopped
    networks:
      - zerro-network

networks:
  zerro-network:
    driver: bridge
